*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{display:none}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:#1a0040;color:#fff}
#root{height:100%;display:flex;flex-direction:column}
.app{height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.bg{position:fixed;inset:0;background:linear-gradient(160deg,#3a0075 0%,#6b0ac9 40%,#b5006e 100%);z-index:0}
.bg::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(180,0,220,.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(245,197,24,.08) 0%,transparent 50%)}

.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,2,30,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-around;padding:10px 0 20px}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;opacity:.38;transition:opacity .2s,transform .15s}
.nav-btn.active{opacity:1;transform:translateY(-2px)}
.nav-btn .ic{font-size:22px}
.nav-btn .lb{font-size:9px;font-weight:800;color:#fff;letter-spacing:.5px;text-transform:uppercase}
.nav-btn.active .lb{color:#F5C518}
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:18px}
.btn{border:none;cursor:pointer;border-radius:50px;font-family:'Nunito',sans-serif;font-weight:800;transition:transform .12s,opacity .12s;font-size:15px;color:#fff}
.btn:active{transform:scale(.94);opacity:.75}
.btn-yellow{background:#F5C518;color:#1a0040}
.btn-ghost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff}
.btn-danger{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);color:#ff7675}
.inp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:14px 16px;color:#fff;font-size:15px;font-family:'Nunito',sans-serif;width:100%;outline:none;transition:border .2s}
.inp::placeholder{color:rgba(255,255,255,.55)}
.inp:focus{border-color:rgba(245,197,24,.5)}
.inp option{background:#3a0075;color:#fff}
select.inp{appearance:none;-webkit-appearance:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-up{animation:fadeUp .3s ease forwards}
.spin{animation:spin .9s linear infinite;display:inline-block}
.pulse{animation:pulse 1.5s ease infinite}
.toast{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:999;border-radius:40px;padding:10px 22px;font-weight:800;font-size:13px;box-shadow:0 4px 24px rgba(0,0,0,.4);max-width:88vw;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tag-green{background:#2ecc71;color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:800;white-space:nowrap}
.tag-blue{background:#3498db;color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:800;white-space:nowrap}
.tag-yellow{background:#F5C518;color:#1a0040;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:800;white-space:nowrap}
.chip{background:rgba(255,255,255,.1);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:600;white-space:nowrap}
.shine{background:linear-gradient(90deg,#F5C518,#ffe55c,#F5C518);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end}
.modal-sheet{background:linear-gradient(160deg,#3a0075,#6b0ac9);border:1px solid rgba(255,255,255,.18);border-radius:28px 28px 0 0;padding:32px 22px 50px;width:100%;animation:fadeUp .3s ease}
.progress-wrap{background:rgba(255,255,255,.08);border-radius:6px;height:5px;overflow:hidden}
.progress-bar{height:100%;border-radius:6px;transition:width .4s ease}
.quiz-opt{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 16px;text-align:left;color:#fff;font-size:14px;font-weight:600;width:100%;cursor:pointer;transition:background .3s,border .3s;font-family:'Nunito',sans-serif}
.quiz-opt:active{transform:scale(.97)}
.quiz-opt.correct{background:rgba(46,204,113,.3)!important;border-color:#2ecc71!important}
.quiz-opt.wrong{background:rgba(231,76,60,.3)!important;border-color:#e74c3c!important}
.task-item{padding:14px 16px;display:flex;align-items:center;gap:12px;transition:opacity .2s}
.task-check{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.3);flex-shrink:0;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,border .2s}
.task-check.done{background:rgba(46,204,113,.3);border-color:#2ecc71}
.loader{width:34px;height:34px;border:3px solid rgba(255,255,255,.1);border-top-color:#F5C518;border-radius:50%}

.loader{width:34px;height:34px;border:3px solid rgba(255,255,255,.1);border-top-color:#F5C518;border-radius:50%}
</style>

// ─── API HELPERS ──────────────────────────────────────────────────────────────
async function api(path, opts) {
  opts = opts || {};
  const res = await fetch(API_BASE + '/api/' + path, {
    headers: Object.assign({'Content-Type':'application/json'}, opts.headers||{}),
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return res.json();
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function registerUser(nome,email,senha,uf){
  const r=await api('register',{method:'POST',body:{nome,email,senha,uf}});
  if(r.error)return{ok:false,msg:r.error};
  return{ok:true,user:r.user};
}
async function loginUser(email,senha){
  const r=await api('login',{method:'POST',body:{email,senha}});
  if(r.error)return{ok:false,msg:r.error};
  return{ok:true,user:r.user};
}

// ─── CONCURSOS ────────────────────────────────────────────────────────────────
async function loadConcursos(uf){
  setState({cLoading:true,concursos:[]});
  try{
    const estado=UF[uf];
    const res=await fetch(API_BASE+'/api/buscar-concursos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uf,estado})});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const editais=data.editais||[];
    if(editais.length===0)throw new Error('vazio');
    const fmt=d=>d.toLocaleDateString('pt-BR');
    const atuEm=data.atualizado_em?new Date(data.atualizado_em):new Date();
    const proxima=new Date(atuEm);
    proxima.setDate(proxima.getDate()+15);
    setState({concursos:editais,cFonte:data.fonte||'live',cLoading:false,cAtualizado:fmt(atuEm),cProxima:fmt(proxima)});
    showToast(editais.length+' concursos ao vivo! 🎯');
  }catch(e){
    setState({concursos:getConcursosBase(uf),cFonte:'base',cLoading:false});
  }
}

}

  }
  return'<div class="screen fade-up"><div style="display:flex;align-items:center;gap:10px;margin-bottom:20px"><button class="btn btn-ghost" id="btnAdmBack" style="padding:8px 14px;font-size:13px">← Sair</button><h2 style="font-size:20px;font-weight:900">⚙️ Painel ADM</h2></div><div class="card" style="padding:20px;margin-bottom:20px"><h3 style="font-weight:800;font-size:16px;margin-bottom:14px">➕ Adicionar Videoaula</h3><div style="display:flex;flex-direction:column;gap:10px"><input class="inp" id="vaTitulo" placeholder="Título da aula *"/><input class="inp" id="vaUrl" placeholder="Link YouTube * (ex: https://youtu.be/...)"/><input class="inp" id="vaDesc" placeholder="Descrição (opcional)"/><div style="display:flex;gap:8px"><select class="inp" id="vaBanca" style="flex:1">'+bancas.map(b=>'<option value="'+b+'">'+( b||"Banca (opcional)")+'</option>').join("")+'</select><select class="inp" id="vaDisciplina" style="flex:1">'+discs.map(d=>'<option value="'+d+'">'+(d||"Disciplina (opcional)")+'</option>').join("")+'</select></div><input class="inp" id="vaOrdem" placeholder="Ordem (número)" type="number" value="0"/><button class="btn btn-yellow" id="btnAdmAddVA" style="padding:14px;font-size:15px">'+(state.vLoading?'<span class="spin">⟳</span>':"➕ Adicionar Videoaula")+'</button></div></div><h3 style="font-weight:800;font-size:16px;margin-bottom:12px">🎬 Videoaulas cadastradas ('+state.videoaulas.length+')</h3>'+(state.vLoading&&state.videoaulas.length===0?'<div style="text-align:center;padding:20px"><div class="loader spin" style="margin:0 auto"></div></div>':"")+(state.videoaulas.length===0&&!state.vLoading?'<p style="color:rgba(255,255,255,.5);font-size:14px;text-align:center;padding:20px">Nenhuma videoaula cadastrada ainda.</p>':"")+'<div style="display:flex;flex-direction:column;gap:8px">'+state.videoaulas.map((v,i)=>{const ytId=v.youtube_url.split('/embed/')[1]?v.youtube_url.split('/embed/')[1].split('?')[0]:null;const thumb=ytId?"https://img.youtube.com/vi/"+ytId+"/default.jpg":null;return'<div class="card" style="padding:14px;display:flex;gap:12px;align-items:center">'+(thumb?'<img src="'+thumb+'" style="width:60px;height:44px;object-fit:cover;border-radius:8px;flex-shrink:0"/>':"")+'<div style="flex:1;min-width:0"><p style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+v.titulo+'</p><div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap">'+chip(v.banca?"🏦 "+v.banca:"")+chip(v.disciplina?"📚 "+v.disciplina:"")+'<span style="background:'+(v.ativo?"rgba(46,204,113,.2)":"rgba(231,76,60,.2)")+';color:'+(v.ativo?"#2ecc71":"#ff7675")+';border-radius:8px;padding:2px 8px;font-size:10px;font-weight:700">'+(v.ativo?"✓ Ativo":"✕ Inativo")+'</span></div></div><div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0"><button class="btn" data-admtoggle="'+v.id+'" data-admativo="'+v.ativo+'" style="background:rgba(255,255,255,.1);padding:4px 10px;font-size:11px;border-radius:12px">'+(v.ativo?"Pausar":"Ativar")+'</button><button class="btn btn-danger" data-admdel="'+v.id+'" style="padding:4px 10px;font-size:11px;border-radius:12px">🗑</button></div></div>';}).join("")+'</div></div>';
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function handleAuth(){
  const nome=document.getElementById("aNome")?document.getElementById("aNome").value:"";
  const email=document.getElementById("aEmail")?document.getElementById("aEmail").value:"";
  const senha=document.getElementById("aSenha")?document.getElementById("aSenha").value:"";
  const ufEl=document.getElementById("aUf");
  const uf=ufEl?ufEl.value:"SP";
  if(!nome||!email||!senha){showToast("Preencha todos os campos","e");return;}
  setState({aLoading:true});
  if(state.aMode==="register"){
    const r=await registerUser(nome,email,senha,uf);
    if(!r.ok){showToast(r.msg,"e");setState({aLoading:false});return;}
    showToast("Conta criada! Bem-vindo(a)! 🎓");
    setState({user:r.user,isPro:r.user.is_pro||false,scr:"home",aLoading:false});
    loadUserData(r.user);
  }else{
    const r=await loginUser(email,senha);
    if(!r.ok){showToast(r.msg,"e");setState({aLoading:false});return;}
    showToast("Olá, "+r.user.nome+"! 👋");
    setState({user:r.user,isPro:r.user.is_pro||false,scr:"home",aLoading:false});
    loadUserData(r.user);
  }
}

async function loadUserData(user){
  const [tasks,qHistory]=await Promise.all([loadTasksAPI(user.id),loadQuizHistoryAPI(user.id)]);
  setState({tasks,qHistory});
  loadConcursos(user.uf);
  const params=new URLSearchParams(window.location.search);
  if(params.get('assinatura')==='sucesso'){
    showToast('Pagamento confirmado! Bem-vindo ao PRO! ⭐');
    setState({isPro:true});
    window.history.replaceState({},'',window.location.pathname);
  }
}

function navTo(scr){
  if((scr==="quiz"||scr==="tarefas"||scr==="videoaulas")&&!state.isPro){setState({upgModal:true});return;}
  if(scr==="videoaulas"){
    setState({scr:"videoaulas",selVaga:null,selVideoaula:null,vLoading:true});
    loadVideoaulasAPI().then(videoaulas=>setState({videoaulas,vLoading:false}));
    return;
  }
  setState({scr,selVaga:null,selVideoaula:null});
}

async function iniciarQuiz(banca){setState({bancaSel:banca,qIdx:0,qAns:null,qScore:0,qDone:false,scr:"quiz_jogo"});}

async function responder(idx){
  if(state.qAns!==null)return;
  const questoes=QUIZ_BANCAS[state.bancaSel].questoes;
  const correta=questoes[state.qIdx].r===idx;
  const novoScore=correta?state.qScore+1:state.qScore;
  setState({qAns:idx,qScore:novoScore});
  setTimeout(async()=>{
    if(state.qIdx+1<questoes.length){setState({qIdx:state.qIdx+1,qAns:null});}
    else{
      const novoH={banca:state.bancaSel,score:novoScore,total:questoes.length,data:new Date().toLocaleDateString("pt-BR")};
      const hist=[novoH,...state.qHistory].slice(0,20);
      await saveQuizResultAPI(state.user.id,state.bancaSel,novoScore,questoes.length);
      setState({qDone:true,qHistory:hist});
    }
  },1100);
}

// ─── BIND EVENTS ─────────────────────────────────────────────────────────────
function bindEvents(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};

  on("authTabLogin","click",()=>setState({aMode:"login"}));
  on("authTabReg","click",()=>setState({aMode:"register"}));
  on("authSwitch","click",()=>setState({aMode:"register"}));
  on("authSwitch2","click",()=>setState({aMode:"login"}));
  on("btnAuth","click",handleAuth);
  on("aSenha","keydown",e=>{if(e.key==="Enter")handleAuth();});

  on("btnUpgOk","click",async()=>{
    if(state.user){const ok=await assinarPRO(state.user.id,state.user.email,state.user.nome);if(!ok)showToast("Erro ao abrir pagamento.","e");}
    setState({upgModal:false});
  });
  on("btnUpgX","click",()=>setState({upgModal:false}));
  const ov=document.getElementById("upgOverlay");
  if(ov)ov.addEventListener("click",e=>{if(e.target.id==="upgOverlay")setState({upgModal:false});});

  document.querySelectorAll("[data-nav]").forEach(btn=>btn.addEventListener("click",()=>navTo(btn.dataset.nav)));
  on("btnHomeUpg","click",()=>setState({upgModal:true}));
  on("btnHomeRefresh","click",()=>{if(!state.cLoading)loadConcursos(state.user.uf);});
  document.querySelectorAll("[data-vaga]").forEach(btn=>btn.addEventListener("click",()=>setState({selVaga:state.concursos[parseInt(btn.dataset.vaga)],scr:"vagas"})));
  on("btnVagaBack","click",()=>setState({selVaga:null}));
  on("btnVagasRefresh","click",()=>{if(!state.cLoading)loadConcursos(state.user.uf);});
  document.querySelectorAll("[data-vagaidx]").forEach(btn=>btn.addEventListener("click",()=>setState({selVaga:state.concursos[parseInt(btn.dataset.vagaidx)]})));

  document.querySelectorAll("[data-banca]").forEach(btn=>btn.addEventListener("click",()=>iniciarQuiz(btn.dataset.banca)));
  on("btnQuizSair","click",()=>setState({scr:"quiz",bancaSel:null}));
  on("btnQuizRefaz","click",()=>iniciarQuiz(state.bancaSel));
  on("btnQuizOutras","click",()=>setState({scr:"quiz",bancaSel:null}));
  document.querySelectorAll("[data-opt]").forEach(btn=>btn.addEventListener("click",()=>responder(parseInt(btn.dataset.opt))));

  on("btnVABack","click",()=>setState({selVideoaula:null}));
  document.querySelectorAll("[data-va]").forEach(btn=>btn.addEventListener("click",()=>setState({selVideoaula:state.videoaulas[parseInt(btn.dataset.va)]})));

  on("btnAddTask","click",async()=>{
    const val=$("novaTask")?$("novaTask").value.trim():"";
    if(!val)return;
    const nova=await addTaskAPI(state.user.id,val);
    if(nova){setState({tasks:[...state.tasks,nova]});showToast("Tarefa adicionada! ✅");}
  });
  on("novaTask","keydown",async e=>{
    if(e.key==="Enter"){
      const val=e.target.value.trim();if(!val)return;
      const nova=await addTaskAPI(state.user.id,val);
      if(nova){setState({tasks:[...state.tasks,nova]});showToast("Tarefa adicionada! ✅");}
    }
  });
  document.querySelectorAll("[data-filtro]").forEach(btn=>btn.addEventListener("click",()=>setState({filtroTask:btn.dataset.filtro})));
  document.querySelectorAll("[data-taskid]").forEach(btn=>btn.addEventListener("click",async()=>{
    const task=state.tasks.find(t=>t.id===btn.dataset.taskid);
    if(!task)return;
    const novas=state.tasks.map(t=>t.id===btn.dataset.taskid?{...t,feita:!t.feita}:t);
    await toggleTaskAPI(state.user.id,btn.dataset.taskid,!task.feita);
    setState({tasks:novas});
  }));
  document.querySelectorAll("[data-deltask]").forEach(btn=>btn.addEventListener("click",async()=>{
    await deleteTaskAPI(state.user.id,btn.dataset.deltask);
    setState({tasks:state.tasks.filter(t=>t.id!==btn.dataset.deltask)});
    showToast("Tarefa removida");
  }));
  on("btnClearDone","click",async()=>{
    const qtd=state.tasks.filter(t=>t.feita).length;
    await clearDoneTasksAPI(state.user.id);
    setState({tasks:state.tasks.filter(t=>!t.feita)});
    showToast(qtd+" tarefa(s) removida(s)");
  });

  on("btnPerfUpg","click",()=>setState({upgModal:true}));
  on("perfilUf","change",async e=>{
    const novoUf=e.target.value;
    setState({user:{...state.user,uf:novoUf}});
    loadConcursos(novoUf);
    showToast("Monitorando "+UF[novoUf]+"! 📡");
  });
  on("btnLogout","click",()=>setState({user:null,scr:"auth",aMode:"login",concursos:[],tasks:[],qHistory:[],cFonte:"",selVaga:null,isPro:false}));
  on("btnAdmAccess","click",()=>setState({scr:"adm",admAuthed:false,admPass:""}));

  on("btnAdmLogin","click",async()=>{
    const pass=$("admPassInput")?$("admPassInput").value:"";
    const r=await api('videoaulas',{method:'GET'});
    if(r.error){showToast("Erro de conexão","e");return;}
    // Validate by trying an ADM-only request
    const test=await fetch(API_BASE+'/api/videoaulas',{method:'POST',headers:{'Content-Type':'application/json','x-admin-password':pass},body:JSON.stringify({titulo:"_test_",youtube_url:"https://youtu.be/dQw4w9WgXcQ"})});
    const testR=await test.json();
    if(testR.error&&testR.error.toLowerCase().includes("senha")){showToast("Senha incorreta","e");return;}
    if(testR.videoaula)await api('videoaulas',{method:'DELETE',headers:{'x-admin-password':pass},body:{id:testR.videoaula.id}});
    setState({admAuthed:true,admPass:pass,vLoading:true});
    const vas=await loadVideoaulasAPI();
    setState({videoaulas:vas,vLoading:false});
  });
  on("admPassInput","keydown",e=>{if(e.key==="Enter")on("btnAdmLogin","click",()=>{});document.getElementById("btnAdmLogin")&&document.getElementById("btnAdmLogin").click();});
  on("btnAdmBack","click",()=>setState({scr:"perfil",admAuthed:false}));

  on("btnAdmAddVA","click",async()=>{
    const titulo=$("vaTitulo")?$("vaTitulo").value.trim():"";
    const youtube_url=$("vaUrl")?$("vaUrl").value.trim():"";
    const descricao=$("vaDesc")?$("vaDesc").value.trim():"";
    const banca=$("vaBanca")?$("vaBanca").value:"";
    const disciplina=$("vaDisciplina")?$("vaDisciplina").value:"";
    const ordem=parseInt($("vaOrdem")?$("vaOrdem").value:0)||0;
    if(!titulo||!youtube_url){showToast("Título e URL são obrigatórios","e");return;}
    setState({vLoading:true});
    const r=await addVideoaulaAPI(state.admPass,{titulo,descricao,youtube_url,banca,disciplina,ordem});
    if(r.error){showToast(r.error,"e");setState({vLoading:false});return;}
    const vas=await loadVideoaulasAPI();
    setState({videoaulas:vas,vLoading:false});
    showToast("Videoaula adicionada! 🎬");
  });

  document.querySelectorAll("[data-admtoggle]").forEach(btn=>btn.addEventListener("click",async()=>{
    const ativo=btn.dataset.admativo==="true";
    setState({vLoading:true});
    await toggleVideoaulaAPI(state.admPass,btn.dataset.admtoggle,!ativo);
    const vas=await loadVideoaulasAPI();
    setState({videoaulas:vas,vLoading:false});
  }));
  document.querySelectorAll("[data-admdel]").forEach(btn=>btn.addEventListener("click",async()=>{
    if(!confirm("Remover esta videoaula?"))return;
    setState({vLoading:true});
    await deleteVideoaulaAPI(state.admPass,btn.dataset.admdel);
    const vas=await loadVideoaulasAPI();
    setState({videoaulas:vas,vLoading:false});
    showToast("Videoaula removida");
  }));
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
